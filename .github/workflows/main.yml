name: CI Pipeline

# Run on PRs (gate merges) and on pushes to main (catch anything that lands).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.4" # keep in sync with go.mod in both modules; 1.26.4 patches GO-2026-5037/5039

permissions:
  contents: read

jobs:
  # ── Lint + formatting ────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: gofmt check
        working-directory: ${{ matrix.module }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: ${{ matrix.module }}
          # Build golangci-lint from source with the job's Go 1.26.4 toolchain.
          # The prebuilt binaries are compiled with an older Go and refuse to lint
          # a module whose go.mod targets a newer language version than the
          # linter's own build ("Go language version ... is lower than the
          # targeted Go version"). Compiling from source keeps them in sync.
          install-mode: goinstall
          # Config lives at the repo root; point the linter at it explicitly.
          args: --config=${{ github.workspace }}/.golangci.yml

  # ── Tests (race detector where concurrency lives; see notes below) ───────
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      # Race detector on the client (fast) and, for the server, only on the
      # concurrent code (the ratelimit package). The server's tests/ package is
      # bcrypt-cost-14 heavy and has no concurrency to detect, so it runs without
      # -race to stay under CI time limits — but still runs with -timeout as a guard.
      - name: Test (client, with race detector)
        if: matrix.module == 'client'
        working-directory: client
        run: go test -race -coverprofile=coverage.out ./...

      - name: Test (server ratelimit, with race detector)
        if: matrix.module == 'server'
        working-directory: server
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-please-override-in-prod-0123456789' }}
        run: go test -race ./middleware/...

      - name: Test (server, full suite without race)
        if: matrix.module == 'server'
        working-directory: server
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-please-override-in-prod-0123456789' }}
        run: go test -timeout 8m -coverprofile=coverage.out ./...

  # ── Build binaries ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            client/go.sum
            server/go.sum

      - name: Build client
        run: cd client && go build -o nimbus ./cli/main.go

      - name: Build server
        run: cd server && go build -o api-server ./main.go

  # ── Dependency vulnerability scan ────────────────────────────────────────
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Run govulncheck
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Secret scanning ──────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so PR pushes are scanned across the whole diff range.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Failure notification (unchanged) ─────────────────────────────────────
  notify-n8n-on-failure:
    runs-on: ubuntu-latest
    needs: [lint, test, build, govulncheck, gitleaks]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Trigger n8n webhook
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.N8N_WEBHOOK_SECRET }}" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
             }'
