version: "3.8"

services:
  localstack:
    image: localstack/localstack:latest
    container_name: nimbus-localstack
    environment:
      SERVICES: s3
      EDGE_PORT: 4566
      DEBUG: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  api:
    build:
      context: ./server
      target: final
    container_name: nimbus-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      LOCAL_DEV: true
      DATABASE_URL: "cloud-suite-db-instance.c4jeeky2it7l.us-east-1.rds.amazonaws.com"
      AWS_REGION: us-east-1
      S3_BUCKET: nimbus-bucket
      S3_ENDPOINT: http://localstack:4566
      S3_FORCE_PATH_STYLE: true
    depends_on:
      localstack:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  localstack_data:
