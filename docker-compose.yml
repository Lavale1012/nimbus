services:
  postgres:
    image: postgres:15
    container_name: nimbus-postgres
    environment:
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus
      POSTGRES_DB: nimbus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimbus -d nimbus"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: nimbus-localstack
    environment:
      SERVICES: s3
      DEBUG: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nimbus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      target: final
    container_name: nimbus-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      LOCAL_DEV: "true"
      DATABASE_URL: "host=postgres user=nimbus password=nimbus dbname=nimbus port=5432 sslmode=disable"
      AWS_REGION: us-east-1
      S3_BUCKET: nimbus-cli-storage
      S3_ENDPOINT: http://localstack:4566
      S3_FORCE_PATH_STYLE: "true"
      # Must be >= 32 bytes (validated at startup). Provided via .env or shell.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (>=32 bytes)}
      # Redis-backed rate limiter; "redis" resolves to the service below.
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  localstack_data:
