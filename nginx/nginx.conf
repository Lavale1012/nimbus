events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=files:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

    server {
        listen 80;
        server_name nim.test localhost;

        # Auth endpoints — strict rate limit
        location ~ ^/v1/api/(login|register) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # File endpoints — moderate rate limit
        location ~ ^/v1/api/files {
            limit_req zone=files burst=20 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # All other API endpoints
        location /v1/api/ {
            limit_req zone=general burst=40 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check — no rate limit
        location /health {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
        }
    }
}
